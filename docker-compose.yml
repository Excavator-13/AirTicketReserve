services:
  backend:
    build:
      context: ./backend
    container_name: airticket-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=django-insecure-dev-key-change-in-production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - airticket-network

  frontend:
    build:
      context: ./frontend
    container_name: airticket-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_PROXY_TARGET=http://backend:8000
    networks:
      - airticket-network

networks:
  airticket-network:
    driver: bridge
